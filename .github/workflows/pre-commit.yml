name: pre-commit

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
    - uses: actions/setup-python@3542bca2639a428e1796aaa6a2ffef0c0f575566 # v3
    - run: python -m pip install pre-commit
      shell: bash
    - run: python -m pip freeze --local
      shell: bash
    - name: Install uv and set the python version
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      with:
        python-version: 3.13
        enable-cache: true
    - name: pre-commit cache key
      run: echo "PY=$(python -VV | sha256sum | cut -d' ' -f1)" >> "$GITHUB_ENV"
    - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cache/pre-commit
        key: pre-commit|${{ env.PY }}|${{ hashFiles('.pre-commit-config.yaml') }}
    - name: Install dependencies
      run: |
           uv sync --directory granite_core --frozen --all-extras --group dev
           uv sync --directory acp --frozen --all-extras --group dev
           uv sync --directory a2a --frozen --all-extras --group dev
    - name: Pre-commit
      run: pre-commit run --all-files
    - name: Send failure message pre-commit
      if: failure()  # This step will only run if a previous step failed
      run: echo "The quality verification failed. Please run precommit "